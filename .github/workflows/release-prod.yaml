name: Release (Production)

on:
  workflow_dispatch: {}
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "**/v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: read

jobs:
  Lint:
    uses: ./.github/workflows/lint.yaml
    permissions:
      contents: read

  Test:
    uses: ./.github/workflows/test.yaml
    permissions:
      contents: read

  Build:
    uses: ./.github/workflows/build.yaml
    needs:
      - Test
      - Lint
    permissions:
      contents: write
      packages: write
      attestations: write
      id-token: write
    secrets:
      GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
      GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

  Update-Go-Docs:
    uses: ./.github/workflows/update-go-docs.yaml
    needs:
      - Test
      - Build
    permissions:
      contents: read
